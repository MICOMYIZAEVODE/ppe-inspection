<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Inspection System</title>
    <script>
        // Find and load the correct JS and CSS files
        fetch('/assets/')
            .then(res => res.text())
            .then(html => {
                const jsMatch = html.match(/index-([a-zA-Z0-9]+)\.js/);
                const cssMatch = html.match(/styles-([a-zA-Z0-9]+)\.css/);
                
                if (jsMatch) {
                    const script = document.createElement('script');
                    script.type = 'module';
                    script.src = `/assets/index-${jsMatch[1]}.js`;
                    document.head.appendChild(script);
                }
                if (cssMatch) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = `/assets/styles-${cssMatch[1]}.css`;
                    document.head.appendChild(link);
                }
            });
    </script>
</head>
<body>
    <div id="root"></div>
    <p>Loading...</p>
</body>
</html>
